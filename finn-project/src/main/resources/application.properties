# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ────────────────────────────────────────────────────────────
# CHANGE the password to your own MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/finn_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Abhishek@1204
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# update = auto-create/update tables. Change to 'validate' in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Account Aggregator (AA) ───────────────────────────────────────────────────
# Leave as-is for demo/mock mode. Replace with real credentials to go live.
aa.base-url=https://sandbox.finvu.in/consentapi
aa.client-id=YOUR_AA_CLIENT_ID
aa.client-secret=YOUR_AA_CLIENT_SECRET
aa.redirect-url=http://localhost:8080/api/bank/aa-callback

# ── CORS ──────────────────────────────────────────────────────────────────────
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-origins=*